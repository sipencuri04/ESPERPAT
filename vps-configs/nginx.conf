server {
    listen 80;
    server_name api.sperpat.com; # Ganti dengan domain atau IP VPS Anda

    # Ganti path ini sesuai dengan lokasi tempat Anda menyimpan folder sperpat-backend di VPS
    root /var/www/sperpat-backend/public;
    index index.php index.html;

    # Pengaturan log (Pilihan)
    access_log /var/log/nginx/sperpat-backend-access.log;
    error_log /var/log/nginx/sperpat-backend-error.log;

    location / {
        # Ini akan mencoba mencari file yang diminta. Jika tidak ketemu,
        # request akan diarahkan ke index.php CodeIgniter 4
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Blok untuk menangani file PHP menggunakan PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;

        # Pastikan versi php-fpm disesuaikan dengan yang terinstal di VPS Anda (min 8.1 untuk CI4)
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Blok untuk keamanan: mencegah akses langsung ke file tersembunyi seperti .env atau .git
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Blok untuk mengatasi akses file statis seperti css/js agara lebih cepat
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires max;
        log_not_found off;
    }
}
