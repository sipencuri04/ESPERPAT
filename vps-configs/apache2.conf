<VirtualHost *:80>
    ServerName api.sperpat.com # Ganti dengan domain VPS
    ServerAdmin webmaster@localhost

    # Document Root harus menunjuk langsung ke folder public di dalam aplikasi CI4
    DocumentRoot /var/www/sperpat-backend/public

    <Directory /var/www/sperpat-backend/public/>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Pengaturan agar routing berjalan dengan baik menggunakan .htaccess
        # Ini penting agar file .htaccess bawaan CI4 terpanggil: `RewriteEngine On` dkk.
    </Directory>

    # Menyembunyikan log access
    ErrorLog ${APACHE_LOG_DIR}/sperpat-backend-error.log
    CustomLog ${APACHE_LOG_DIR}/sperpat-backend-access.log combined

    # Proteksi keamanan dasar: tidak mengizinkan akses ke `.env` dan direktori app
    <FilesMatch "^\.env">
        Require all denied
    </FilesMatch>

    <DirectoryMatch "^/var/www/sperpat-backend/(app|tests|writable)/">
        Require all denied
    </DirectoryMatch>
</VirtualHost>
